name: traffic-longformer
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch>=2.0
  - torchvision
  - pytorch-cuda=11.8
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - jupyter
  - tqdm
  - pip
  - pip:
    - scapy
    - dpkt
    - flowcontainer
    - transformers
    - tokenizers
    - sentencepiece
    - longformer  # allenai/longformer for reference
